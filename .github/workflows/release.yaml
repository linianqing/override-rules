name: Release Artifacts

"on":
  push:
    tags:
      - "src-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SRC_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive version from source tag
        run: |
          # src-vX.Y.Z → vX.Y.Z
          VERSION="${SRC_TAG#src-}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid version derived from tag: '$VERSION' (source: '$SRC_TAG')"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Validate source
        run: npm run typecheck && npm run format && npm run lint

      - name: Build release artifacts
        run: npm run artifacts

      - name: Assemble dist payload
        run: |
          set -euo pipefail

          mkdir -p publish/yamls

          cp convert.js publish/convert.js
          cp convert.min.js publish/convert.min.js
          cp -a yamls/. publish/yamls/

          # Package yamls.tar.gz for release assets
          tar -czvf yamls.tar.gz yamls/

          RELEASED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          export RELEASED_AT

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const crypto = require("node:crypto");

          const version = process.env.VERSION;
          const commit = process.env.GITHUB_SHA;
          const releasedAt = process.env.RELEASED_AT;

          function walkFiles(dir) {
            const output = [];
            const stack = [dir];
            while (stack.length > 0) {
              const current = stack.pop();
              for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
                if (entry.name === ".git") continue;
                const fullPath = path.join(current, entry.name);
                if (entry.isDirectory()) {
                  stack.push(fullPath);
                } else {
                  output.push(fullPath);
                }
              }
            }
            return output.sort();
          }

          function sha256(filePath) {
            const data = fs.readFileSync(filePath);
            return crypto.createHash("sha256").update(data).digest("hex");
          }

          function writeManifest(targetDir) {
            const files = walkFiles(targetDir)
              .filter((filePath) => path.basename(filePath) !== "manifest.json")
              .map((filePath) => ({
                path: path.relative(targetDir, filePath).replace(/\\/g, "/"),
                sha256: sha256(filePath),
              }));

            const manifest = {
              tag: version,
              commit,
              releasedAt,
              fileCount: files.length,
              files,
            };

            fs.writeFileSync(
              path.join(targetDir, "manifest.json"),
              `${JSON.stringify(manifest, null, 2)}\n`,
              "utf-8"
            );
          }

          writeManifest("publish");
          NODE

      - name: Publish to dist branch & Update Tag
        run: |
          cd publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b dist
          git add .
          git commit -m "Auto-generated dist for ${VERSION}"
          
          # Force push the dist branch
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f -u origin dist
          
          # Force push the tag to this new commit
          git tag -f "${VERSION}"
          git push -f origin "${VERSION}"

      - name: Generate Release Notes
        run: |
          awk '/^#+ \[?[0-9]+\.[0-9]+\.[0-9]+/ { if (p) exit; p=1; next } p' CHANGELOG.md > RELEASE_NOTES.md
          
          cat >> RELEASE_NOTES.md << 'EOF'
          
          ---
          
          构建产物已同步并放于根目录。

          - JS 覆写 (最新版, 推荐)：`https://cdn.jsdelivr.net/gh/${{ github.repository }}/convert.min.js`
          - JS 覆写 (当前版本)：`https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ env.VERSION }}/convert.min.js`
          - YAML 索引 (最新版)：`https://cdn.jsdelivr.net/gh/${{ github.repository }}/manifest.json`
          - YAML 索引 (当前版本)：`https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ env.VERSION }}/manifest.json`
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          files: |
            convert.js
            convert.min.js
            yamls.tar.gz

      - name: Purge jsDelivr cache
        run: |
          set -euo pipefail

          curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}/convert.min.js"
          curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ env.VERSION }}/convert.min.js"
